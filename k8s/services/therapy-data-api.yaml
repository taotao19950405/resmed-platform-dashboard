apiVersion: apps/v1
kind: Deployment
metadata:
  name: therapy-data-api
  namespace: production
  labels:
    app: therapy-data-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: therapy-data-api
  template:
    metadata:
      labels:
        app: therapy-data-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: therapy-data-api
          image: ghcr.io/taotao19950405/therapy-data-apiatest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgres://resmed:resmed@postgres.production.svc.cluster.local:5432/therapy?sslmode=disable"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: therapy-data-api
  namespace: production
  labels:
    app: therapy-data-api
spec:
  selector:
    app: therapy-data-api
  ports:
    - port: 80
      targetPort: 8080
