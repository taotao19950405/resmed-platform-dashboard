name: CD

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "k8s/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Detect which services actually changed ─────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            device-catalog-api:
              - 'services/device-catalog-api/**'
            order-service:
              - 'services/order-service/**'
            inventory-api:
              - 'services/inventory-api/**'
            patient-service:
              - 'services/patient-service/**'
            therapy-data-api:
              - 'services/therapy-data-api/**'
            notification-service:
              - 'services/notification-service/**'

  # ── Build and push only changed service images ────────────────────────────
  push-images:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update k8s manifests with new image tags ───────────────────────────────
  update-manifests:
    name: Update image tags in manifests
    runs-on: ubuntu-latest
    needs: [changes, push-images]
    if: always() && needs.push-images.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags for changed services
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          for svc in ${{ join(fromJSON(needs.changes.outputs.services), ' ') }}; do
            sed -i "s|image: ghcr.io/${{ github.repository_owner }}/${svc}:.*|image: ghcr.io/${{ github.repository_owner }}/${svc}:${SHA_TAG}|" k8s/services/${svc}.yaml
            echo "Updated ${svc} to ${SHA_TAG}"
          done

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/services/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push

  # ── Deploy to Kubernetes (self-hosted runner required) ─────────────────────
  deploy:
    name: Deploy to production
    runs-on: self-hosted
    needs: update-manifests
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces.yaml

      - name: Deploy PostgreSQL
        run: kubectl apply -f k8s/postgres/postgres.yaml

      - name: Wait for PostgreSQL
        run: kubectl rollout status deployment/postgres -n production --timeout=120s

      - name: Deploy services
        run: kubectl apply -f k8s/services/

      - name: Wait for rollout
        run: |
          for svc in device-catalog-api order-service inventory-api patient-service therapy-data-api notification-service; do
            echo "Waiting for $svc..."
            kubectl rollout status deployment/$svc -n production --timeout=180s
          done

      - name: Apply monitoring
        run: kubectl apply -f k8s/monitoring/

      - name: Smoke test
        run: |
          kubectl port-forward svc/device-catalog-api 18080:80 -n production &
          sleep 5
          curl -sf http://localhost:18080/health | grep '"status":"healthy"'
          echo "✅ Smoke test passed"
          kill %1
