apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: production
  labels:
    app: inventory-api
    team: inventory-team
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        team: inventory-team
    spec:
      containers:
        - name: inventory-api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: production
  labels:
    app: inventory-api
spec:
  selector:
    app: inventory-api
  ports:
    - port: 80
      targetPort: 80
