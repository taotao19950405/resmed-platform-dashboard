apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  namespace: staging
  labels:
    app: search-api
    team: discovery-team
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-api
  template:
    metadata:
      labels:
        app: search-api
        team: discovery-team
    spec:
      containers:
        - name: search-api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: search-api
  namespace: staging
  labels:
    app: search-api
spec:
  selector:
    app: search-api
  ports:
    - port: 80
      targetPort: 80
