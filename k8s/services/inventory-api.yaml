apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: production
  labels:
    app: inventory-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory-api
          image: ghcr.io/taotao19950405/inventory-apiatest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgres://resmed:resmed@postgres.production.svc.cluster.local:5432/inventory?sslmode=disable"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: production
  labels:
    app: inventory-api
spec:
  selector:
    app: inventory-api
  ports:
    - port: 80
      targetPort: 8080
